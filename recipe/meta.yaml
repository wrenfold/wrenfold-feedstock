{% set version = "0.2.1" %}

package:
  name: wrenfold
  version: {{ version }}

source:
  url: https://github.com/wrenfold/wrenfold/releases/download/v{{ version }}/wrenfold-source-v{{ version }}.tar.gz
  sha256: 6615bd669b72569c4f37d3298905a9f34079f03211521d480188250184a7cda0

build:
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
  host:
    - python
    - scikit-build-core ==0.10.7
    - cmake >=3.20
    - ninja >=1.5
    - mypy ==1.9.0
    - pip
  run:
    - python

test:
  imports:
    - wrenfold
    - wrenfold.sym
  requires:
    - pip
    - numpy
    - sympy
    - jax
    - pytorch
  source_files:
    - components/wrapper/tests/*.py
    - examples/**/*.py
    - support/test_wheel.py
  commands:
    - pip check
    - python support/test_wheel.py

about:
  home: https://github.com/wrenfold/wrenfold
  summary: Toolkit for generating code from symbolic math expressions.
  license: MIT
  license_file:
    - LICENSE
    - dependencies/abseil-cpp/LICENSE
    - dependencies/fmt/LICENSE
    - dependencies/pybind11/LICENSE
  doc_url: https://wrenfold.org

extra:
  recipe-maintainers:
    - gareth-cross
